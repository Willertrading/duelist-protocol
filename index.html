<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duelist Protocol</title>
  <style>
    :root {
      --bg: #030706;
      --panel: #07110d;
      --line: #183126;
      --text: #9dffb3;
      --dim: #6fbe82;
      --bright: #d9ffe2;
      --warn: #ffd166;
      --bad: #ff7b7b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, #0a1611 0%, #030706 45%, #020403 100%);
      color: var(--text);
      font-family: "Courier New", Courier, monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .terminal {
      width: min(900px, 100%);
      background: rgba(7, 17, 13, 0.96);
      border: 1px solid var(--line);
      box-shadow:
        0 0 0 1px rgba(157, 255, 179, 0.04),
        0 0 30px rgba(157, 255, 179, 0.08);
      border-radius: 10px;
      overflow: hidden;
    }

    .terminal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.02);
      color: var(--dim);
      font-size: 0.9rem;
    }

    .terminal-body {
      padding: 22px;
    }

    .boot {
      line-height: 1.6;
      white-space: pre-line;
      min-height: 170px;
      color: var(--bright);
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
    }

    @media (max-width: 760px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      background: rgba(255,255,255,0.015);
    }

    .panel-title {
      font-size: 0.92rem;
      color: var(--dim);
      margin-bottom: 12px;
      letter-spacing: 0.08em;
    }

    .status-list {
      display: grid;
      gap: 8px;
      font-size: 0.95rem;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px dashed rgba(157,255,179,0.12);
      padding-bottom: 6px;
    }

    .ok {
      color: var(--text);
    }

    .warn {
      color: var(--warn);
    }

    .input-wrap label {
      display: block;
      margin-bottom: 8px;
      color: var(--dim);
    }

    .input-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input {
      flex: 1 1 260px;
      min-width: 0;
      background: #04100b;
      border: 1px solid #24513b;
      color: var(--bright);
      font: inherit;
      padding: 12px 14px;
      border-radius: 6px;
      outline: none;
    }

    input:focus {
      box-shadow: 0 0 0 2px rgba(157,255,179,0.12);
    }

    button {
      background: #0a1812;
      border: 1px solid #2a6247;
      color: var(--bright);
      font: inherit;
      padding: 12px 16px;
      border-radius: 6px;
      cursor: pointer;
      min-width: 110px;
    }

    button:hover {
      background: #102018;
    }

    .output {
      margin-top: 16px;
      border: 1px dashed #24513b;
      border-radius: 8px;
      padding: 14px;
      min-height: 160px;
      white-space: pre-line;
      line-height: 1.6;
      color: var(--bright);
      background: rgba(0,0,0,0.15);
    }

    .footer-note {
      margin-top: 18px;
      color: var(--dim);
      font-size: 0.9rem;
    }

    .blink {
      animation: blink 1s steps(2, start) infinite;
    }

    @keyframes blink {
      to { visibility: hidden; }
    }

    .hidden-clue {
      color: rgba(157,255,179,0.12);
      font-size: 0.8rem;
      margin-top: 10px;
      user-select: text;
    }
  </style>
</head>
<body>
  <main class="terminal">
    <div class="terminal-header">
      <div>DUELIST PROTOCOL // TERMINAL NODE 07</div>
      <div>STATUS: LISTENING</div>
    </div>

    <div class="terminal-body">
      <div id="boot" class="boot"></div>

      <div class="grid">
        <section class="panel">
          <div class="panel-title">SYSTEM STATUS</div>

          <div class="status-list">
            <div class="status-row">
              <span>Fragment registry</span>
              <span class="ok">PARTIAL</span>
            </div>
            <div class="status-row">
              <span>Pathfinding matrix</span>
              <span class="ok">ONLINE</span>
            </div>
            <div class="status-row">
              <span>Terrain lock</span>
              <span class="warn">UNSTABLE</span>
            </div>
            <div class="status-row">
              <span>Coordinate output</span>
              <span class="ok">RESTRICTED</span>
            </div>
          </div>

          <div class="footer-note">
            Fragments alone are useless.
          </div>

          <!-- clue: the key is something you assemble, not something you remember -->
        </section>

        <section class="panel">
          <div class="panel-title">AUTHENTICATION</div>

          <div class="input-wrap">
            <label for="keyInput">Enter authentication key:</label>

            <div class="input-row">
              <input
                id="keyInput"
                type="text"
                spellcheck="false"
                autocomplete="off"
                placeholder="enter key"
              />
              <button id="enterBtn">ENTER</button>
              <button id="clearBtn" type="button">CLEAR</button>
            </div>
          </div>

          <div id="output" class="output">Awaiting key<span class="blink">_</span></div>

          <div class="hidden-clue">
            node_note: protocol incomplete without assembled fragments
          </div>
        </section>
      </div>
    </div>
  </main>

  <script>
    const correctKey = "STARFROST";
    const keyInput = document.getElementById("keyInput");
    const enterBtn = document.getElementById("enterBtn");
    const clearBtn = document.getElementById("clearBtn");
    const output = document.getElementById("output");
    const boot = document.getElementById("boot");

    const bootLines = [
      "BOOTING DUELIST PROTOCOL...",
      "LOADING FRAGMENT INDEX...",
      "VERIFYING FIELD STATE...",
      "SCANNING FOR AUTHORIZED USER...",
      "USER DETECTED.",
      "AUTHENTICATION REQUIRED."
    ];

    let lineIndex = 0;

    function typeBoot() {
      if (lineIndex < bootLines.length) {
        boot.textContent += bootLines[lineIndex] + "\\n";
        lineIndex += 1;
        setTimeout(typeBoot, 280);
      } else {
        boot.textContent += "\\nREADY.";
      }
    }

    function normalize(value) {
      return value.trim().toLowerCase();
    }

    function checkKey() {
      const entered = normalize(keyInput.value);

      if (!entered) {
        output.textContent = "ERROR: NO KEY DETECTED";
        return;
      }

      if (entered === correctKey) {
        output.textContent =
`ACCESS GRANTED

COORDINATE SHELL UNLOCKED

Complete the coordinates using what you have earned.

N 40.1_5
W 83._2_

FINAL SEARCH RADIUS: 20 FEET

The last move is yours.`;
      } else {
        output.textContent =
`ACCESS DENIED

INVALID KEY

Hint: authentication is built, not guessed.`;
      }
    }

    enterBtn.addEventListener("click", checkKey);

    keyInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        checkKey();
      }
    });

    clearBtn.addEventListener("click", () => {
      keyInput.value = "";
      output.innerHTML = 'Awaiting key<span class="blink">_</span>';
      keyInput.focus();
    });

    typeBoot();

    console.log("DUELIST PROTOCOL // DEBUG");
    console.log("Not everything important is visible at first glance.");
    console.log("Authentication key hint: it belongs to the system itself.");
  </script>
</body>
</html>
